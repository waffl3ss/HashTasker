{{define "head"}}{{end}}

{{define "changelog-content"}}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-clock-history"></i> {{.title}}</h1>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="markdown-content">
                    {{.content}}
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "changelog-scripts"}}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Style markdown content
    const markdownContent = document.querySelector('.markdown-content');
    if (markdownContent) {
        // Add Bootstrap classes to markdown elements
        markdownContent.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(el => {
            el.classList.add('mb-3');
            // Add special styling for version headers
            if (el.tagName === 'H2' && el.textContent.match(/v?\d+\.\d+\.\d+/)) {
                el.classList.add('border-bottom', 'pb-2', 'text-primary');
            }
        });

        markdownContent.querySelectorAll('p').forEach(el => {
            el.classList.add('mb-3');
        });

        markdownContent.querySelectorAll('ul, ol').forEach(el => {
            el.classList.add('mb-3');
        });

        markdownContent.querySelectorAll('pre').forEach(el => {
            el.classList.add('bg-light', 'p-3', 'rounded', 'mb-3');
        });

        markdownContent.querySelectorAll('code').forEach(el => {
            if (!el.parentElement.tagName === 'PRE') {
                el.classList.add('bg-light', 'px-1', 'rounded');
            }
        });

        markdownContent.querySelectorAll('blockquote').forEach(el => {
            el.classList.add('blockquote', 'border-start', 'border-4', 'border-info', 'ps-3', 'mb-3');
        });

        markdownContent.querySelectorAll('table').forEach(el => {
            el.classList.add('table', 'table-striped', 'table-hover', 'mb-3');
        });

        // Style list items that start with common changelog prefixes
        markdownContent.querySelectorAll('li').forEach(el => {
            const text = el.textContent.trim();
            if (text.startsWith('Added:') || text.startsWith('✅') || text.startsWith('+ ')) {
                el.classList.add('text-success');
            } else if (text.startsWith('Fixed:') || text.startsWith('🐛') || text.startsWith('- Fixed')) {
                el.classList.add('text-warning');
            } else if (text.startsWith('Removed:') || text.startsWith('❌') || text.startsWith('- Removed')) {
                el.classList.add('text-danger');
            } else if (text.startsWith('Changed:') || text.startsWith('🔄') || text.startsWith('- Changed')) {
                el.classList.add('text-info');
            }
        });
    }
});
</script>
{{end}}
