{{define "head"}}{{end}}

{{define "analytics-content"}}
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-graph-up"></i> Analytics</h1>
            <div class="d-flex gap-2 align-items-center">
                <button id="ntdsToggle" class="btn btn-secondary btn-sm" onclick="toggleNTDS()" title="NTDS jobs (NTLM with >300 hashes) are excluded by default">
                    <i class="bi bi-funnel-fill"></i> NTDS Excluded
                </button>
                <button class="btn btn-outline-danger" onclick="clearAnalytics()">
                    <i class="bi bi-trash"></i> Clear Data
                </button>
                <button class="btn btn-outline-primary" onclick="loadAnalytics()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Summary Cards -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title text-muted">Total Jobs</h5>
                <h2 class="display-4" id="totalJobs">-</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title text-muted">Total Hashes Submitted</h5>
                <h2 class="display-4" id="totalHashes">-</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <h5 class="card-title text-muted">Total Hashes Cracked</h5>
                <h2 class="display-4" id="totalCracked">-</h2>
                <small class="text-muted" id="crackRate"></small>
            </div>
        </div>
    </div>
</div>

<!-- Jobs Over Time Chart -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-calendar3"></i> Jobs Over Time</h5>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-primary active" onclick="setTimePeriod('daily')">Daily</button>
                        <button type="button" class="btn btn-outline-primary" onclick="setTimePeriod('weekly')">Weekly</button>
                        <button type="button" class="btn btn-outline-primary" onclick="setTimePeriod('monthly')">Monthly</button>
                        <button type="button" class="btn btn-outline-primary" onclick="setTimePeriod('yearly')">Yearly</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <canvas id="jobsOverTimeChart" height="100"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Wordlists and Rulesets -->
<div class="row mb-4">
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-file-text"></i> Top Wordlists</h5>
            </div>
            <div class="card-body">
                <div id="wordlistUsage">
                    <div class="text-center text-muted">
                        <div class="loading-spinner me-2"></div>
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-list-ol"></i> Top Rulesets</h5>
            </div>
            <div class="card-body">
                <div id="rulesetUsage">
                    <div class="text-center text-muted">
                        <div class="loading-spinner me-2"></div>
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Jobs by User and Hash Modes -->
<div class="row mb-4">
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-people"></i> Jobs by User</h5>
            </div>
            <div class="card-body">
                <div id="jobsByUser">
                    <div class="text-center text-muted">
                        <div class="loading-spinner me-2"></div>
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-hash"></i> Hash Mode Usage</h5>
            </div>
            <div class="card-body">
                <div id="hashModeUsage">
                    <div class="text-center text-muted">
                        <div class="loading-spinner me-2"></div>
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "analytics-scripts"}}
<script>
let analyticsData = null;
let jobsChart = null;
let currentPeriod = 'daily';
let excludeNTDS = true;

document.addEventListener('DOMContentLoaded', function() {
    loadAnalytics();
});

function toggleNTDS() {
    excludeNTDS = !excludeNTDS;
    const btn = document.getElementById('ntdsToggle');
    if (excludeNTDS) {
        btn.classList.remove('btn-outline-secondary');
        btn.classList.add('btn-secondary');
        btn.innerHTML = '<i class="bi bi-funnel-fill"></i> NTDS Excluded';
    } else {
        btn.classList.remove('btn-secondary');
        btn.classList.add('btn-outline-secondary');
        btn.innerHTML = '<i class="bi bi-funnel"></i> NTDS Included';
    }
    loadAnalytics();
}

function loadAnalytics() {
    const url = `/api/admin/analytics?exclude_ntds=${excludeNTDS}`;
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                showAlert(data.error, 'error');
                return;
            }
            analyticsData = data;
            updateSummary();
            updateJobsChart();
            updateWordlistUsage();
            updateRulesetUsage();
            updateJobsByUser();
            updateHashModeUsage();
        })
        .catch(error => {
            console.error('Error loading analytics:', error);
            showAlert('Failed to load analytics data', 'error');
        });
}

function updateSummary() {
    const summary = analyticsData.summary;
    document.getElementById('totalJobs').textContent = formatNumber(summary.total_jobs);
    document.getElementById('totalHashes').textContent = formatNumber(summary.total_hashes);
    document.getElementById('totalCracked').textContent = formatNumber(summary.total_cracked);

    if (summary.total_hashes > 0) {
        const rate = ((summary.total_cracked / summary.total_hashes) * 100).toFixed(1);
        document.getElementById('crackRate').textContent = `(${rate}% crack rate)`;
    }
}

function updateJobsChart() {
    const ctx = document.getElementById('jobsOverTimeChart').getContext('2d');

    if (jobsChart) {
        jobsChart.destroy();
    }

    const periodData = analyticsData.jobs_by_period[currentPeriod] || [];

    // Reverse to show oldest first (left to right)
    const sortedData = [...periodData].reverse();

    const labels = sortedData.map(item => formatPeriodLabel(item.period_key, currentPeriod));
    const values = sortedData.map(item => item.job_count);

    const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
    const textColor = isDark ? '#ffffff' : '#000000';
    const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

    jobsChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Jobs',
                data: values,
                backgroundColor: 'rgba(13, 110, 253, 0.7)',
                borderColor: 'rgba(13, 110, 253, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    ticks: { color: textColor },
                    grid: { color: gridColor }
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        color: textColor,
                        stepSize: 1
                    },
                    grid: { color: gridColor }
                }
            }
        }
    });
}

function setTimePeriod(period) {
    currentPeriod = period;

    // Update button states
    document.querySelectorAll('.btn-group .btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');

    updateJobsChart();
}

function formatPeriodLabel(key, period) {
    switch (period) {
        case 'daily':
            // Format: 2025-01-15 -> Jan 15
            const date = new Date(key);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        case 'weekly':
            // Format: 2025-W03 -> W03
            return key.split('-')[1];
        case 'monthly':
            // Format: 2025-01 -> Jan 2025
            const [year, month] = key.split('-');
            const monthDate = new Date(year, parseInt(month) - 1, 1);
            return monthDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        case 'yearly':
            return key;
        default:
            return key;
    }
}

function updateWordlistUsage() {
    const container = document.getElementById('wordlistUsage');
    const data = analyticsData.wordlist_usage || [];

    if (data.length === 0) {
        container.innerHTML = '<div class="text-center text-muted">No data yet</div>';
        return;
    }

    const maxCount = Math.max(...data.map(item => item.usage_count));

    let html = '<div class="list-group list-group-flush">';
    data.forEach(item => {
        const percentage = (item.usage_count / maxCount) * 100;
        html += `
            <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                <div class="flex-grow-1 me-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="text-truncate" style="max-width: 200px;" title="${item.wordlist_name}">${item.wordlist_name}</span>
                        <span class="badge bg-primary">${item.usage_count}</span>
                    </div>
                    <div class="progress" style="height: 4px;">
                        <div class="progress-bar" style="width: ${percentage}%"></div>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';

    container.innerHTML = html;
}

function updateRulesetUsage() {
    const container = document.getElementById('rulesetUsage');
    const data = analyticsData.ruleset_usage || [];

    if (data.length === 0) {
        container.innerHTML = '<div class="text-center text-muted">No data yet</div>';
        return;
    }

    const maxCount = Math.max(...data.map(item => item.usage_count));

    let html = '<div class="list-group list-group-flush">';
    data.forEach(item => {
        const percentage = (item.usage_count / maxCount) * 100;
        html += `
            <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                <div class="flex-grow-1 me-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="text-truncate" style="max-width: 200px;" title="${item.ruleset_name}">${item.ruleset_name}</span>
                        <span class="badge bg-success">${item.usage_count}</span>
                    </div>
                    <div class="progress" style="height: 4px;">
                        <div class="progress-bar bg-success" style="width: ${percentage}%"></div>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';

    container.innerHTML = html;
}

function updateJobsByUser() {
    const container = document.getElementById('jobsByUser');
    const data = analyticsData.jobs_by_user || [];

    if (data.length === 0) {
        container.innerHTML = '<div class="text-center text-muted">No data yet</div>';
        return;
    }

    const maxCount = Math.max(...data.map(item => item.job_count));

    let html = '<div class="list-group list-group-flush">';
    data.forEach(item => {
        const percentage = (item.job_count / maxCount) * 100;
        html += `
            <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                <div class="flex-grow-1 me-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span><i class="bi bi-person me-1"></i>${item.username}</span>
                        <span class="badge bg-info">${item.job_count} jobs</span>
                    </div>
                    <div class="progress" style="height: 4px;">
                        <div class="progress-bar bg-info" style="width: ${percentage}%"></div>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';

    container.innerHTML = html;
}

function updateHashModeUsage() {
    const container = document.getElementById('hashModeUsage');
    const data = analyticsData.hash_mode_usage || [];

    if (data.length === 0) {
        container.innerHTML = '<div class="text-center text-muted">No data yet</div>';
        return;
    }

    const maxCount = Math.max(...data.map(item => item.usage_count));

    let html = '<div class="list-group list-group-flush">';
    data.forEach(item => {
        const percentage = (item.usage_count / maxCount) * 100;
        html += `
            <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                <div class="flex-grow-1 me-3">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="text-truncate" style="max-width: 200px;" title="${item.hash_mode} - ${item.hash_mode_name}">
                            <span class="badge bg-secondary me-1">${item.hash_mode}</span>
                            ${item.hash_mode_name}
                        </span>
                        <span class="badge bg-warning text-dark">${item.usage_count}</span>
                    </div>
                    <div class="progress" style="height: 4px;">
                        <div class="progress-bar bg-warning" style="width: ${percentage}%"></div>
                    </div>
                </div>
            </div>
        `;
    });
    html += '</div>';

    container.innerHTML = html;
}

function formatNumber(num) {
    if (num === undefined || num === null) return '0';
    return num.toLocaleString();
}

async function clearAnalytics() {
    const confirmed1 = await showConfirm('Are you sure you want to clear all analytics data? This action cannot be undone.', 'Clear Analytics (1/3)');
    if (!confirmed1) return;

    const confirmed2 = await showConfirm('This will permanently delete all job statistics, usage data, and historical records. Continue?', 'Clear Analytics (2/3)');
    if (!confirmed2) return;

    const confirmed3 = await showConfirm('Final confirmation: All analytics data will be permanently erased. Proceed?', 'Clear Analytics (3/3)');
    if (!confirmed3) return;

    fetch('/api/admin/analytics', { method: 'DELETE' })
        .then(response => response.json())
        .then(data => {
            if (data.message) {
                showAlert('Analytics data cleared successfully', 'success');
                loadAnalytics();
            } else {
                showAlert(data.error || 'Unknown error', 'error');
            }
        })
        .catch(error => {
            console.error('Error clearing analytics:', error);
            showAlert('Error clearing analytics data', 'error');
        });
}
</script>
{{end}}
